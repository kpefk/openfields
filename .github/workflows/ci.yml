name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP (PHPCS · PHPStan · PHPUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPCS
        run: composer run phpcs

      - name: PHPStan
        run: composer run phpstan

      - name: PHPUnit
        run: composer run test

  js:
    name: JS/TS (type-check · lint · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate types from JSON schema
        run: bun run generate:types

      - name: Type-check (blocks merge on type errors)
        run: bun run type-check

      - name: Lint JS/TS
        run: bun run lint:js

      - name: Build
        run: bun run build

  plugin-check:
    name: WordPress Plugin Check (informational)
    runs-on: ubuntu-latest
    # NON-BLOCKING for now. The action runs against the repo root, so packaging
    # checks (plugin_content: hidden_files / application_detected / .github /
    # unexpected markdown) fail on dev tooling that never ships in production.
    # Its exclude-checks input is also unreliable in this release (silently
    # ignored). The correct fix is to run Plugin Check against an assembled
    # production distribution (production files only, vendor from
    # `composer install --no-dev`); that lands with the release-zip pipeline
    # (see plan, Крок 10), at which point this becomes blocking and the full
    # check set is restored. Until then the job is informational — read its log
    # for the valuable security / i18n / prefixing findings.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      # Pin only the major tag @v1; re-verify behaviour on bumps.
      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
