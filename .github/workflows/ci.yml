name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP (PHPCS · PHPStan · PHPUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPCS
        run: composer run phpcs

      - name: PHPStan
        run: composer run phpstan

      - name: PHPUnit
        run: composer run test

  js:
    name: JS/TS (type-check · lint · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate types from JSON schema
        run: bun run generate:types

      - name: Type-check (blocks merge on type errors)
        run: bun run type-check

      - name: Lint JS/TS
        run: bun run lint:js

      - name: Build
        run: bun run build

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Canonical usage: the action provisions its own wp-env and runs
      # Plugin Check against the repo root (the plugin). We pin only the major
      # tag @v1; re-verify exclude-checks behaviour whenever it bumps, since
      # some releases have silently ignored exclude inputs.
      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          # Dev-only directories that ship no runtime PHP (their files have no
          # ABSPATH guard, which direct_file_access would otherwise flag).
          exclude-directories: |
            tests
            docs
          # Newline-separated EXACT check slugs (verified against
          # WordPress/plugin-check docs/checks.md — invalid slugs are silently
          # ignored).
          #
          # `plugin_content` (hidden_files / application_detected / VCS dir /
          # unexpected markdown) fires because the check runs against the repo
          # root, which contains dev tooling (composer.json, package.json,
          # .editorconfig, .github, …). The proper fix is to run Plugin Check
          # against an assembled distribution (production files only); that is
          # built with the release-zip pipeline (see plan, Крок 10), at which
          # point this exclusion is removed and the full set restored.
          exclude-checks: |
            plugin_content
