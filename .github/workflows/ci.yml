name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  php:
    name: PHP (PHPCS · PHPStan · PHPUnit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: pcov
          tools: composer

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress

      - name: PHPCS
        run: composer run phpcs

      - name: PHPStan
        run: composer run phpstan

      - name: PHPUnit (with coverage)
        run: vendor/bin/phpunit --coverage-text

  js:
    name: JS/TS (type-check · lint · build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate types from JSON schema
        run: bun run generate:types

      - name: Type-check (blocks merge on type errors)
        run: bun run type-check

      - name: Lint JS/TS
        run: bun run lint:js

      - name: Unit tests (Jest)
        run: bun run test:js

      - name: Build
        run: bun run build

  plugin-check:
    name: WordPress Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build production assets
        run: |
          composer install --no-dev --optimize-autoloader --no-progress
          bun install --frozen-lockfile
          bun run build

      # Assemble a distribution containing only production files, so the check
      # runs against what actually ships (no dev tooling, hidden files or docs).
      - name: Assemble production distribution
        run: |
          set -euo pipefail
          DIST=dist/openfields
          mkdir -p "$DIST/assets"
          cp openfields.php uninstall.php readme.txt LICENSE "$DIST/"
          cp -r includes "$DIST/"
          cp -r assets/build "$DIST/assets/build"
          cp -r vendor "$DIST/"
          if compgen -G "languages/*.pot" > /dev/null; then
            mkdir -p "$DIST/languages"
            cp languages/*.pot "$DIST/languages/"
          fi
          find "$DIST" -depth -name '.*' -exec rm -rf {} +

      # Pin only the major tag @v1; re-verify exclude behaviour on bumps.
      - name: Run Plugin Check
        uses: wordpress/plugin-check-action@v1
        with:
          build-dir: ./dist/openfields
          # vendor is Composer's autoloader (third-party); scanning it is noise.
          exclude-directories: |
            vendor
          # `prefixing`: OpenFields deliberately exposes the ACF-compatible
          # unprefixed API (get_field, update_field, …), guarded against
          # conflicts in openfields.php. `trademarks`: the readme positions the
          # plugin against ACF. `minified_files`: the shipped build is minified
          # by @wordpress/scripts; the source lives in assets/src in the repo.
          # Everything else — including plugin_content — is enforced.
          exclude-checks: |
            prefixing
            trademarks
            minified_files
